<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Greca 3D - Tienda del Futuro</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #eee; touch-action: none; font-family: sans-serif; }
        #interfaz { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: grid; grid-template-columns: repeat(3, 75px); gap: 10px; z-index: 100; }
        .boton { width: 75px; height: 75px; background: rgba(255, 255, 255, 0.5); border: 2px solid #0ff; border-radius: 15px; color: #008888; display: flex; align-items: center; justify-content: center; font-size: 26px; user-select: none; -webkit-tap-highlight-color: transparent; }
        #arriba { grid-column: 2; } #izq { grid-column: 1; } #der { grid-column: 3; } #abajo { grid-column: 2; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; color: #333; pointer-events: none; z-index: 10; font-weight: bold; }
    </style>
</head>
<body>
    <div id="info"><h1>LA GRECA 3D</h1><p id="status">Tienda Futurista de Manizales</p></div>
    <div id="interfaz">
        <div class="boton" id="arriba">▲</div>
        <div class="boton" id="izq">◀</div>
        <div class="boton" id="abajo">▼</div>
        <div class="boton" id="der">▶</div>
    </div>

    <script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } 
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const escena = new THREE.Scene();
        escena.background = new THREE.Color(0xe0f7fa); 

        const camara = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const render = new THREE.WebGLRenderer({ antialias: true });
        render.setSize(window.innerWidth, window.innerHeight);
        render.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(render.domElement);

        const luzHemi = new THREE.HemisphereLight(0xffffff, 0xbbbbbb, 2.5);
        escena.add(luzHemi);
        const luzDir = new THREE.DirectionalLight(0xffffff, 1);
        luzDir.position.set(5, 10, 5);
        escena.add(luzDir);

        // --- MATERIALES ---
        const matPiso = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1 });
        const matPared = new THREE.MeshStandardMaterial({ color: 0xf0f0f0 });
        const matNeonBase = new THREE.MeshBasicMaterial({ color: 0x00ffff }); // Cian brillante
        const matVidrio = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.2, metalness: 0.9, roughness: 0.05 });

        // ESTRUCTURA LOCAL 50x50
        const crearBox = (w, h, d, x, y, z, mat, parent=escena) => {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.position.set(x, y, z);
            parent.add(mesh);
            return mesh;
        };

        crearBox(50, 0.1, 50, 0, 0, 0, matPiso); // Suelo
        crearBox(50, 0.5, 50, 0, 8, 0, matPared); // Techo
        crearBox(50, 10, 0.5, 0, 4, -25, matPared); // Pared fondo
        crearBox(50, 10, 0.5, 0, 4, 25, matPared);  // Pared frente
        crearBox(0.5, 10, 50, -25, 4, 0, matPared); // Pared izq
        crearBox(0.5, 10, 50, 25, 4, 0, matPared);  // Pared der

        // --- NUEVO: PLATAFORMAS FLOTANTES Y CUBOS DE VIDRIO ---
        const crearExhibidor = (x, z) => {
            const grupo = new THREE.Group();
            grupo.position.set(x, 0, z);

            // 1. Baldosa Flotante (Luz neón por debajo)
            crearBox(2, 0.1, 2, 0, 0.05, 0, matPiso, grupo); // Parte blanca
            const neón = crearBox(2.2, 0.02, 2.2, 0, -0.01, 0, matNeonBase, grupo); // Borde neón inferior

            // 2. Soporte central (Vidrio flotante)
            crearBox(0.1, 0.8, 0.1, 0, 0.5, 0, matVidrio, grupo); 

            // 3. Cubo de Vidrio Transparente (Encima, donde irán los artículos)
            const cuboVidrio = crearBox(1.5, 1.5, 1.5, 0, 1.5, 0, matVidrio, grupo);

            escena.add(grupo);
        };

        // DISTRIBUCIÓN EN PASILLOS (Parecido a la imagen)
        // Pasillo Izquierdo
        crearExhibidor(-6, -8); crearExhibidor(-6, -4); crearExhibidor(-6, 0); crearExhibidor(-6, 4);
        // Pasillo Central
        crearExhibidor(0, -8); crearExhibidor(0, -4); crearExhibidor(0, 0); crearExhibidor(0, 4);
        // Pasillo Derecho
        crearExhibidor(6, -8); crearExhibidor(6, -4); crearExhibidor(6, 0); crearExhibidor(6, 4);

        // --- CARGA DEL ROBOT DE PRUEBA (Se mantiene) ---
        let mezclador, robotReal;
        const loader = new GLTFLoader();
        const urlRobot = 'https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb';

        loader.load(urlRobot, (gltf) => {
            robotReal = gltf.scene;
            robotReal.scale.set(0.4, 0.4, 0.4); 
            robotReal.position.set(5, 0, 5);
            escena.add(robotReal);
            mezclador = new THREE.AnimationMixer(robotReal);
            const clip = THREE.AnimationClip.findByName(gltf.animations, 'Walking');
            if(clip) mezclador.clipAction(clip).play();
        });

        // --- CONTROLES Y MOVIMIENTO ---
        camara.position.set(0, 1.7, 15);
        let mov = { adelante: false, atras: false, izq: false, der: false };
        let lon = 0, lat = 0, touchX, touchY;

        const boton = (id, accion) => {
            const el = document.getElementById(id);
            el.onpointerdown = (e) => { e.preventDefault(); mov[accion] = true; };
            el.onpointerup = (e) => { e.preventDefault(); mov[accion] = false; };
        };
        boton('arriba', 'adelante'); boton('abajo', 'atras'); boton('izq', 'izq'); boton('der', 'der');

        window.addEventListener('pointerdown', (e) => { touchX = e.clientX; touchY = e.clientY; });
        window.addEventListener('pointermove', (e) => {
            if (e.buttons > 0 || e.pointerType === 'touch') {
                lon += (e.clientX - touchX) * 0.45;
                lat -= (e.clientY - touchY) * 0.45;
                lat = Math.max(-85, Math.min(85, lat));
                touchX = e.clientX; touchY = e.clientY;
            }
        });

        let anguloRobot = 0;
        const reloj = new THREE.Clock();

        function animar() {
            requestAnimationFrame(animar);
            const delta = reloj.getDelta();
            if (mezclador) mezclador.update(delta);

            const phi = THREE.MathUtils.degToRad(90 - lat);
            const theta = THREE.MathUtils.degToRad(lon);
            const target = new THREE.Vector3().setFromSphericalCoords(1, phi, theta).add(camara.position);
            camara.lookAt(target);

            const vel = 0.2;
            const forward = new THREE.Vector3();
            camara.getWorldDirection(forward);
            forward.y = 0; forward.normalize();
            const right = new THREE.Vector3().crossVectors(forward, camara.up);

            if(mov.adelante) camara.position.addScaledVector(forward, vel);
            if(mov.atras) camara.position.addScaledVector(forward, -vel);
            if(mov.izq) camara.position.addScaledVector(right, -vel);
            if(mov.der) camara.position.addScaledVector(right, vel);

            camara.position.x = Math.max(-24, Math.min(24, camara.position.x));
            camara.position.z = Math.max(-24, Math.min(24, camara.position.z));

            if(robotReal) {
                robotReal.position.x += Math.cos(anguloRobot) * 0.05;
                robotReal.position.z += Math.sin(anguloRobot) * 0.05;
                robotReal.rotation.y = -anguloRobot + Math.PI/2;
                if(Math.abs(robotReal.position.x) > 23 || Math.abs(robotReal.position.z) > 23) anguloRobot += 1.5;
            }

            render.render(escena, camara);
        }
        animar();

        window.addEventListener('resize', () => {
            camara.aspect = window.innerWidth / window.innerHeight;
            camara.updateProjectionMatrix();
            render.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
