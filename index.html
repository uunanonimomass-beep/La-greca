<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Greca 3D - Robot Moderno</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #eee; touch-action: none; font-family: sans-serif; }
        #interfaz { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: grid; grid-template-columns: repeat(3, 75px); gap: 10px; z-index: 100; }
        .boton { width: 75px; height: 75px; background: rgba(255, 255, 255, 0.5); border: 2px solid #0ff; border-radius: 50%; color: #008888; display: flex; align-items: center; justify-content: center; font-size: 26px; user-select: none; -webkit-tap-highlight-color: transparent; }
        #arriba { grid-column: 2; } #izq { grid-column: 1; } #der { grid-column: 3; } #abajo { grid-column: 2; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; color: #333; pointer-events: none; z-index: 10; font-weight: bold; }
    </style>
</head>
<body>
    <div id="info"><h1>LA GRECA 3D</h1><p>Tienda Futurista - Manizales</p></div>
    <div id="interfaz">
        <div class="boton" id="arriba">▲</div>
        <div class="boton" id="izq">◀</div>
        <div class="boton" id="abajo">▼</div>
        <div class="boton" id="der">▶</div>
    </div>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const escena = new THREE.Scene();
        escena.background = new THREE.Color(0xe0f7fa);

        const camara = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const render = new THREE.WebGLRenderer({ antialias: true });
        render.setSize(window.innerWidth, window.innerHeight);
        render.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(render.domElement);

        const luzHemi = new THREE.HemisphereLight(0xffffff, 0xbbbbbb, 2.5);
        escena.add(luzHemi);

        const matPiso = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.05, metalness: 0.1 });
        const matPared = new THREE.MeshStandardMaterial({ color: 0xf0f0f0 });
        const matNeon = new THREE.MeshBasicMaterial({ color: 0x00ffff });
        const matRobot = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.7, roughness: 0.3 });

        // ESTRUCTURA LOCAL (50x50)
        const crearBox = (w, h, d, x, y, z, mat) => {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.position.set(x, y, z);
            escena.add(mesh);
        };

        crearBox(50, 0.1, 50, 0, 0, 0, matPiso);
        crearBox(50, 0.5, 50, 0, 10, 0, matPared);
        for(let i = -20; i <= 20; i+=10) { crearBox(50, 0.1, 1, 0, 9.7, i, matNeon); }

        crearBox(50, 10, 0.5, 0, 5, -25, matPared);
        crearBox(50, 0.2, 0.2, 0, 3, -24.7, matNeon);
        crearBox(50, 10, 0.5, 0, 5, 25, matPared);
        crearBox(0.5, 10, 50, -25, 5, 0, matPared);
        crearBox(0.5, 10, 50, 25, 5, 0, matPared);

        // --- ROBOT MODERNO CON BRAZOS Y PIERNAS ---
        const robot = new THREE.Group();
        
        // Cuerpo
        const tronco = new THREE.Mesh(new THREE.CapsuleGeometry(0.25, 0.6, 4, 8), matRobot);
        tronco.position.y = 1.2;
        robot.add(tronco);

        // Cabeza
        const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), matRobot);
        cabeza.position.y = 1.8;
        robot.add(cabeza);
        const visor = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.08, 0.2), matNeon);
        visor.position.set(0, 1.85, 0.15);
        robot.add(visor);

        // Extremidades
        const pIzq = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.6, 4, 8), matRobot);
        pIzq.position.set(-0.18, 0.5, 0);
        robot.add(pIzq);

        const pDer = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.6, 4, 8), matRobot);
        pDer.position.set(0.18, 0.5, 0);
        robot.add(pDer);

        const bIzq = new THREE.Mesh(new THREE.CapsuleGeometry(0.06, 0.5, 4, 8), matRobot);
        bIzq.position.set(-0.4, 1.3, 0);
        robot.add(bIzq);

        const bDer = new THREE.Mesh(new THREE.CapsuleGeometry(0.06, 0.5, 4, 8), matRobot);
        bDer.position.set(0.4, 1.3, 0);
        robot.add(bDer);

        robot.position.set(5, 0, 5);
        escena.add(robot);

        // CONTROLES
        camara.position.set(0, 1.7, 20);
        let mov = { adelante: false, atras: false, izq: false, der: false };
        let lon = 0, lat = 0, touchX, touchY;

        const boton = (id, accion) => {
            const el = document.getElementById(id);
            el.onpointerdown = (e) => { e.preventDefault(); mov[accion] = true; };
            el.onpointerup = (e) => { e.preventDefault(); mov[accion] = false; };
        };
        boton('arriba', 'adelante'); boton('abajo', 'atras'); boton('izq', 'izq'); boton('der', 'der');

        window.addEventListener('pointerdown', (e) => { touchX = e.clientX; touchY = e.clientY; });
        window.addEventListener('pointermove', (e) => {
            if (e.buttons > 0 || e.pointerType === 'touch') {
                lon += (e.clientX - touchX) * 0.45;
                lat -= (e.clientY - touchY) * 0.45;
                lat = Math.max(-85, Math.min(85, lat));
                touchX = e.clientX; touchY = e.clientY;
            }
        });

        let anguloRobot = 0;
        let tiempo = 0;

        function animar() {
            requestAnimationFrame(animar);
            tiempo += 0.15;

            const phi = THREE.MathUtils.degToRad(90 - lat);
            const theta = THREE.MathUtils.degToRad(lon);
            const target = new THREE.Vector3();
            target.setFromSphericalCoords(1, phi, theta).add(camara.position);
            camara.lookAt(target);

            const vel = 0.22;
            const forward = new THREE.Vector3();
            camara.getWorldDirection(forward);
            forward.y = 0; forward.normalize();
            const right = new THREE.Vector3().crossVectors(forward, camara.up);

            if(mov.adelante) camara.position.addScaledVector(forward, vel);
            if(mov.atras) camara.position.addScaledVector(forward, -vel);
            if(mov.izq) camara.position.addScaledVector(right, -vel);
            if(mov.der) camara.position.addScaledVector(right, vel);

            camara.position.x = Math.max(-24, Math.min(24, camara.position.x));
            camara.position.z = Math.max(-24, Math.min(24, camara.position.z));

            // Animación de caminata del robot
            pIzq.position.z = Math.sin(tiempo) * 0.25;
            pDer.position.z = -Math.sin(tiempo) * 0.25;
            bIzq.position.z = -Math.sin(tiempo) * 0.2;
            bDer.position.z = Math.sin(tiempo) * 0.2;

            robot.position.x += Math.cos(anguloRobot) * 0.07;
            robot.position.z += Math.sin(anguloRobot) * 0.07;
            robot.rotation.y = -anguloRobot + Math.PI/2;
            if(Math.abs(robot.position.x) > 23 || Math.abs(robot.position.z) > 23) {
                anguloRobot += Math.PI / 2 + Math.random();
            }

            render.render(escena, camara);
        }
        animar();

        window.addEventListener('resize', () => {
            camara.aspect = window.innerWidth / window.innerHeight;
            camara.updateProjectionMatrix();
            render.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
