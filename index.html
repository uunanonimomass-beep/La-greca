<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Greca 3D - Tienda Equipada</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #instrucciones { position: absolute; top: 10px; width: 100%; text-align: center; color: white; font-family: sans-serif; pointer-events: none; z-index: 10; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>
    <div id="instrucciones"><h1>La Greca</h1><p>Tienda equipada con obstáculos para el robot</p></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const escena = new THREE.Scene();
        escena.background = new THREE.Color(0x87ceeb);

        const camara = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const render = new THREE.WebGLRenderer({ antialias: true });
        render.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(render.domElement);

        // LUCES
        escena.add(new THREE.AmbientLight(0xffffff, 0.7));
        const luzSol = new THREE.DirectionalLight(0xffffff, 1);
        luzSol.position.set(5, 10, 7);
        escena.add(luzSol);

        // ESCENARIO
        const suelo = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshStandardMaterial({ color: 0xcccccc }));
        suelo.rotation.x = -Math.PI / 2;
        escena.add(suelo);

        const matPared = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const pFondo = new THREE.Mesh(new THREE.PlaneGeometry(20, 10), matPared);
        pFondo.position.set(0, 5, -10);
        escena.add(pFondo);

        // LISTA DE OBSTÁCULOS PARA EL ROBOT
        const obstaculos = [];

        function crearMueble(ancho, alto, profundo, x, z, color, esTele = false) {
            const geo = new THREE.BoxGeometry(ancho, alto, profundo);
            const mat = new THREE.MeshStandardMaterial({ color: color });
            const mueble = new THREE.Mesh(geo, mat);
            mueble.position.set(x, alto / 2, z);
            escena.add(mueble);
            
            // Guardamos los límites del mueble para que el robot los reconozca
            obstaculos.push({
                xMin: x - ancho/2 - 0.6,
                xMax: x + ancho/2 + 0.6,
                zMin: z - profundo/2 - 0.6,
                zMax: z + profundo/2 + 0.6
            });

            if(esTele) {
                const pantallaGeo = new THREE.BoxGeometry(ancho * 0.9, alto * 0.8, 0.1);
                const pantallaMat = new THREE.MeshBasicMaterial({color: 0x000000});
                const pantalla = new THREE.Mesh(pantallaGeo, pantallaMat);
                pantalla.position.set(x, alto/2, z + profundo/2 + 0.01);
                escena.add(pantalla);
            }
        }

        // COLOCAR MUEBLES
        crearMueble(4, 1.5, 2, -5, -5, 0x8b4513); // Mesa 1
        crearMueble(3.5, 2, 0.2, -5, -4, 0x333333, true); // TV sobre Mesa 1
        
        crearMueble(4, 1.5, 2, 5, -5, 0x8b4513);  // Mesa 2
        crearMueble(3.5, 2, 0.2, 5, -4, 0x333333, true);  // TV sobre Mesa 2

        crearMueble(8, 4, 1, 0, -9, 0x555555);   // Estante grande al fondo

        // EL ROBOT
        const robot = new THREE.Group();
        const cuerpo = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1, 0.6), new THREE.MeshStandardMaterial({color: 0x777777}));
        cuerpo.position.y = 0.5;
        robot.add(cuerpo);
        const cabeza = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 0.4), new THREE.MeshStandardMaterial({color: 0xaaaaaa}));
        cabeza.position.y = 1.2;
        robot.add(cabeza);
        const ojo = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0xff0000}));
        ojo.position.set(0, 1.2, 0.2);
        robot.add(ojo);
        escena.add(robot);

        // MOVIMIENTO DEL ROBOT
        let velocidad = 0.04;
        let angulo = Math.random() * Math.PI * 2;

        camara.position.set(0, 12, 18);
        const controles = new OrbitControls(camara, render.domElement);

        function animar() {
            requestAnimationFrame(animar);

            let proxX = robot.position.x + Math.cos(angulo) * velocidad;
            let proxZ = robot.position.z + Math.sin(angulo) * velocidad;

            // Revisar si la próxima posición choca con bordes o muebles
            let choca = false;

            // Bordes del suelo
            if (proxX > 9.5 || proxX < -9.5 || proxZ > 9.5 || proxZ < -9.5) choca = true;

            // Muebles
            obstaculos.forEach(obs => {
                if (proxX > obs.xMin && proxX < obs.xMax && proxZ > obs.zMin && proxZ < obs.zMax) {
                    choca = true;
                }
            });

            if (choca) {
                angulo += Math.PI / 2 + (Math.random() * 0.5); // Gira si hay obstáculo
            } else {
                robot.position.x = proxX;
                robot.position.z = proxZ;
                robot.rotation.y = -angulo + Math.PI/2;
            }

            controles.update();
            render.render(escena, camara);
        }
        animar();
    </script>
</body>
</html>
