<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Greca - Vista Personaje</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; }
        #interfaz { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; z-index: 100; }
        .boton { width: 60px; height: 60px; background: rgba(255,255,255,0.3); border: 2px solid white; border-radius: 10px; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; user-select: none; }
        .boton:active { background: rgba(0,255,255,0.5); }
        #arriba { grid-column: 2; }
        #izq { grid-column: 1; }
        #der { grid-column: 3; }
        #abajo { grid-column: 2; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; color: white; font-family: sans-serif; pointer-events: none; }
    </style>
</head>
<body>
    <div id="info"><h1>La Greca 3D</h1><p>Usa los controles para caminar</p></div>
    
    <div id="interfaz">
        <div class="boton" id="arriba">▲</div>
        <div class="boton" id="izq">◀</div>
        <div class="boton" id="abajo">▼</div>
        <div class="boton" id="der">▶</div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        const escena = new THREE.Scene();
        const camara = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const render = new THREE.WebGLRenderer({ antialias: true });
        render.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(render.domElement);

        // 1. EL LOCAL (Suelo, 4 Paredes y Techo)
        const matGris = new THREE.MeshStandardMaterial({ color: 0x888888 });
        const matBlanco = new THREE.MeshStandardMaterial({ color: 0xeeeeee, side: THREE.DoubleSide });

        // Suelo
        const suelo = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), matGris);
        suelo.rotation.x = -Math.PI / 2;
        escena.add(suelo);

        // Techo con luces representadas por cuadros brillantes
        const techo = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), matBlanco);
        techo.rotation.x = Math.PI / 2;
        techo.position.y = 5;
        escena.add(techo);

        // Paredes (Fondo, Frente, Izquierda, Derecha)
        const crearPared = (w, h, x, y, z, ry = 0) => {
            const p = new THREE.Mesh(new THREE.PlaneGeometry(w, h), matBlanco);
            p.position.set(x, y, z);
            p.rotation.y = ry;
            escena.add(p);
        };
        crearPared(20, 5, 0, 2.5, -10); // Fondo
        crearPared(20, 5, 0, 2.5, 10);  // Frente
        crearPared(20, 5, -10, 2.5, 0, Math.PI/2); // Izquierda
        crearPared(20, 5, 10, 2.5, 0, -Math.PI/2); // Derecha

        // 2. LUCES DEL TECHO
        const luzAmbiental = new THREE.AmbientLight(0xffffff, 0.4);
        escena.add(luzAmbiental);

        for(let i = -5; i <= 5; i+=5) {
            for(let j = -5; j <= 5; j+=5) {
                const luzLocal = new THREE.PointLight(0xffffff, 15, 10);
                luzLocal.position.set(i, 4.8, j);
                escena.add(luzLocal);
                // Lamparita visual
                const foco = new THREE.Mesh(new THREE.BoxGeometry(1, 0.1, 1), new THREE.MeshBasicMaterial({color: 0xffffff}));
                foco.position.set(i, 4.95, j);
                escena.add(foco);
            }
        }

        // 3. MUEBLES (Obstáculos)
        const obstaculos = [];
        const crearMueble = (w, h, d, x, z) => {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({color: 0x442200}));
            m.position.set(x, h/2, z);
            escena.add(m);
            obstaculos.push(new THREE.Box3().setFromObject(m));
        };
        crearMueble(4, 1, 2, -5, -5); // Mesa
        crearMueble(4, 1, 2, 5, -5);  // Mesa

        // 4. EL ROBOT (Sigue ahí)
        const robot = new THREE.Group();
        robot.add(new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.5), new THREE.MeshStandardMaterial({color: 0x555555})));
        const ojo = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0x00ffff}));
        ojo.position.set(0, 0.4, 0.25);
        robot.add(ojo);
        robot.position.y = 0.4;
        escena.add(robot);

        // 5. CONTROLES DE PERSONAJE (Altura 1.70m)
        camara.position.set(0, 1.7, 8);
        let mov = { adelante: false, atras: false, izq: false, der: false };

        const setupBoton = (id, prop) => {
            const b = document.getElementById(id);
            b.ontouchstart = () => mov[prop] = true;
            b.ontouchend = () => mov[prop] = false;
        };
        setupBoton('arriba', 'adelante');
        setupBoton('abajo', 'atras');
        setupBoton('izq', 'izq');
        setupBoton('der', 'der');
