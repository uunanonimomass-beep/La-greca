<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Greca 3D - Robot Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; font-family: sans-serif; }
        #interfaz { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: grid; grid-template-columns: repeat(3, 75px); gap: 10px; z-index: 100; }
        .boton { width: 75px; height: 75px; background: rgba(255, 255, 255, 0.4); border: 2px solid #0ff; border-radius: 50%; color: #008888; display: flex; align-items: center; justify-content: center; font-size: 26px; user-select: none; }
        #arriba { grid-column: 2; } #izq { grid-column: 1; } #der { grid-column: 3; } #abajo { grid-column: 2; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; color: white; pointer-events: none; z-index: 10; text-shadow: 2px 2px 5px black; }
    </style>
</head>
<body>
    <div id="info"><h1>LA GRECA 3D</h1><p id="status">Buscando Robot en la red...</p></div>
    <div id="interfaz">
        <div class="boton" id="arriba">▲</div>
        <div class="boton" id="izq">◀</div>
        <div class="boton" id="abajo">▼</div>
        <div class="boton" id="der">▶</div>
    </div>

    <script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } 
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const escena = new THREE.Scene();
        escena.background = new THREE.Color(0x111111);

        const camara = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const render = new THREE.WebGLRenderer({ antialias: true });
        render.setSize(window.innerWidth, window.innerHeight);
        render.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(render.domElement);

        // ILUMINACIÓN POTENTE PARA EL MODELO
        const luzHemi = new THREE.HemisphereLight(0xffffff, 0x444444, 4);
        escena.add(luzHemi);
        const luzPunto = new THREE.PointLight(0x00ffff, 100);
        luzPunto.position.set(0, 5, 5);
        escena.add(luzPunto);

        // ESCENARIO (50x50)
        const matPiso = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1 });
        const matPared = new THREE.MeshStandardMaterial({ color: 0x222222 });
        const suelo = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), matPiso);
        suelo.rotation.x = -Math.PI/2;
        escena.add(suelo);

        // --- CARGAR ROBOT DESDE ENLACE PÚBLICO ---
        let mezclador, robotReal;
        const loader = new GLTFLoader();
        
        // Usamos un modelo de muestra de la librería de Three.js (Robot Expressive)
        const urlRobot = 'https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb';

        loader.load(urlRobot, (gltf) => {
            robotReal = gltf.scene;
            robotReal.scale.set(0.4, 0.4, 0.4); 
            robotReal.position.set(0, 0, 0);
            escena.add(robotReal);

            mezclador = new THREE.AnimationMixer(robotReal);
            // Buscamos la animación de "Walking" por nombre
            const clip = THREE.AnimationClip.findByName(gltf.animations, 'Walking');
            if(clip) {
                mezclador.clipAction(clip).play();
            } else {
                mezclador.clipAction(gltf.animations[0]).play();
            }
            
            document.getElementById('status').innerText = "Robot Moderno Conectado";
        }, undefined, (e) => {
            document.getElementById('status').innerText = "Error al conectar con el servidor de modelos";
        });

        // CONTROLES
        camara.position.set(0, 1.7, 10);
        let mov = { adelante: false, atras: false, izq: false, der: false };
        let lon = 0, lat = 0, touchX, touchY;

        const setupBoton = (id, acc) => {
            const b = document.getElementById(id);
            b.onpointerdown = (e) => { e.preventDefault(); mov[acc] = true; };
            b.onpointerup = (e) => { e.preventDefault(); mov[acc] = false; };
        };
        setupBoton('arriba', 'adelante'); setupBoton('abajo', 'atras');
        setupBoton('izq', 'izq'); setupBoton('der', 'der');

        window.addEventListener('pointermove', (e) => {
            if (e.buttons > 0 || e.pointerType === 'touch') {
                lon += (e.clientX - (touchX || e.clientX)) * 0.45;
                lat -= (e.clientY - (touchY || e.clientY)) * 0.45;
                lat = Math.max(-85, Math.min(85, lat));
                touchX = e.clientX; touchY = e.clientY;
            }
        });

        let anguloRobot = 0;
        const reloj = new THREE.Clock();

        function animar() {
            requestAnimationFrame(animar);
            const delta = reloj.getDelta();
            if (mezclador) mezclador.update(delta);

            const phi = THREE.MathUtils.degToRad(90 - lat);
            const theta = THREE.MathUtils.degToRad(lon);
            const target = new THREE.Vector3().setFromSphericalCoords(1, phi, theta).add(camara.position);
            camara.lookAt(target);

            const fwd = new THREE.Vector3();
            camara.getWorldDirection(fwd);
            fwd.y = 0; fwd.normalize();
            const rgt = new THREE.Vector3().crossVectors(fwd, camara.up);

            if(mov.adelante) camara.position.addScaledVector(fwd, 0.2);
            if(mov.atras) camara.position.addScaledVector(fwd, -0.2);
            if(mov.izq) camara.position.addScaledVector(rgt, -0.2);
            if(mov.der) camara.position.addScaledVector(rgt, 0.2);

            if(robotReal) {
                robotReal.position.x += Math.cos(anguloRobot) * 0.05;
                robotReal.position.z += Math.sin(anguloRobot) * 0.05;
                robotReal.rotation.y = -anguloRobot + Math.PI/2;
                if(Math.abs(robotReal.position.x) > 20 || Math.abs(robotReal.position.z) > 20) anguloRobot += 1.5;
            }

            render.render(escena, camara);
        }
        animar();
    </script>
</body>
</html>
