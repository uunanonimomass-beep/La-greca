<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Greca 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #instrucciones { position: absolute; top: 10px; width: 100%; text-align: center; color: white; font-family: sans-serif; pointer-events: none; }
    </style>
</head>
<body>
    <div id="instrucciones"><h1>La Greca</h1><p>Cargando tienda 3D...</p></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const escena = new THREE.Scene();
        const camara = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const render = new THREE.WebGLRenderer({ antialias: true });
        render.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(render.domElement);

        // Suelo Neón (Rejilla)
        const rejilla = new THREE.GridHelper(20, 40, 0x00ffff, 0x004444);
        escena.add(rejilla);

        camara.position.set(0, 5, 10);
        const controles = new OrbitControls(camara, render.domElement);

        function animar() {
            requestAnimationFrame(animar);
            controles.update();
            render.render(escena, camara);
        }
        
        document.getElementById('instrucciones').innerHTML = "<h1>La Greca</h1><p>Usa tu dedo para girar la cámara</p>";
        animar();
    </script>
</body>
</html>
